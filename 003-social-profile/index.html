<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>

    :root { font-family: 'Inter', sans-serif; }
    @supports (font-variation-settings: normal) {
      :root { font-family: 'InterVariable', sans-serif; }
    }

    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    * {
      padding: 0;
      margin: 0;
      border: 0;
      
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: hsl(0, 0%, 100%);

      
    }

    body {
      min-height: 100vh;

      display: flex;
      flex-flow: row wrap;
      gap: 0;
      align-items: center;
      justify-content: center;

      background-color: hsl(0, 0%, 8%);
    }

    .profile {
      width: 280px;

      padding: 35px 35px 10px 35px ;

      display: flex;
      flex-flow: column wrap;
      align-items: center;
      gap: 20px;

      border-radius:10px;
      background-color: hsl(0, 0%, 12%);
    }
    .profile-container{
      text-align: center;
    }

    .profile-picture {
      width: 50%;

      clip-path: circle(50%);
    }

    h1 {
      font-size: 24px;
    }

    h2 {
      color: hsl(75, 94%, 57%);
      font-size: 14px;
    }

    p {
      font-size: 14px;
    }

    ul {
      min-width: 100%;

      padding-left: 0rem;

      list-style-type: none;
    }

    li {
      margin: 0 0 15px 0;
      padding: 15px 0 15px 0;

      color: hsl(0, 0%, 100%);
      background-color: hsl(0, 0%, 20%);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-align: center;

      border-radius: 10px;
    }

    a {
      text-decoration: none;
    }

    /* a li:link，a li:visited{
      
    } */


    a li:focus {
      background-color: grey;
    }

    a li:hover{
      background-color: grey;
    }

    /* a li:active{
      
    } */


  </style>
</head>

<body>

  <div class="profile">
    <div class="profile-container">
      <img src="assets/images/avatar-jessica.jpeg" class="profile-picture" alt="Jessica Randall"/>
    </div>
    <div>
      <h1>Jessica Randall</h1>
    </div>
    <div>
      <h2>London, United Kingdom</h2>
    </div>
    <div>
      <p>"Front-end developer and avid reader."</p>
    </div>
    <ul>
      <a href="https://github.com/"><li>
        GitHub
      </li></a>
      <a href="https://www.frontendmentor.io/"><li>
        Frontend Mentor
      </li></a>
      <a href="https://www.linkedin.com/"><li>
        LinkedIn
      </li></a>
      <a href="https://x.com/"><li>
        Twitter
      </li></a>
      <a href="https://github.com"><li>
        Instagram
      </li></a>
    </ul>

  </div>

<!-- 
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>

  -->
</body>

</html>
